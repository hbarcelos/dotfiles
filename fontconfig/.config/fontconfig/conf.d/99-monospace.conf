<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- High-priority override: monospace should resolve to Hasklug Med. -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Hasklug Nerd Font Mono Med</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Force kitty monospace requests specifically as well. -->
  <match target="pattern">
    <test name="prgname" compare="eq">
      <string>kitty</string>
    </test>
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Hasklug Nerd Font Mono Med</string>
    </edit>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- If kitty resolves to base family, remap base -> Med. -->
  <match target="pattern">
    <test name="prgname" compare="eq">
      <string>kitty</string>
    </test>
    <test name="family" compare="eq">
      <string>Hasklug Nerd Font Mono</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Hasklug Nerd Font Mono Med</string>
    </edit>
  </match>

  <!-- Some kitty builds resolve to abbreviated family names (e.g. HasklugNFM). -->
  <match target="pattern">
    <test name="prgname" compare="eq">
      <string>kitty</string>
    </test>
    <test name="family" compare="eq">
      <string>HasklugNFM</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>Hasklug Nerd Font Mono Med</string>
    </edit>
  </match>
</fontconfig>
